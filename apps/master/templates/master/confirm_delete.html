{% extends "base.html" %}
{% block title %}Hapus — SITAPIS{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:40px auto;">
    <div class="card-body">
        <div class="confirm-delete">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Konfirmasi Hapus</h3>
            <p>Apakah Anda yakin ingin menghapus <strong>{{ object }}</strong>? Tindakan ini tidak dapat dibatalkan.</p>
            <form method="post">
                {% csrf_token %}
                <div style="display:flex;gap:8px;justify-content:center;">
                    <a href="{% url back_url %}" class="btn btn-outline">Batal</a>
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Hapus</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
