{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SITAPIS</title>
    <link rel="icon" type="image/png" href="{% static 'icon/logo_favicon.png' %}" sizes="32x32">
    <link rel="shortcut icon" type="image/png" href="{% static 'icon/logo_favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon" style="background: transparent;">
                    <img src="{% static 'icon/logo.png' %}" alt="SITAPIS Logo"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h1>SITAPIS</h1>
                <p>Sistem Informasi Tata Administrasi</p>
                <p>Penomoran dan Inventarisasi Surat</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                Username atau password salah.
            </div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username"><i class="far fa-user"></i> Username</label>
                    {{ form.username }}
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="id_password"><i class="fas fa-lock"></i> Password</label>
                    {{ form.password }}
                    <span class="password-toggle" onclick="togglePassword()" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: #6f7f90; z-index: 10;">
                        <i class="far fa-eye" id="togglePasswordIcon"></i>
                    </span>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("id_password");
            const toggleIcon = document.getElementById("togglePasswordIcon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
